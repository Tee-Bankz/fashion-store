<!doctype html>
<html>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js"></script>
  </head>

  <body>
    <marquee>Book an appointment with our designers</marquee>

    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="trustees.html">Board</a></li>
        <li><a href="events.html">Events</a></li>

      </ul>

    <div class="contact-container">
      <div class="container">
        <h2>Inquiry & Appointment</h2>

        <form id="contactForm">
          <input type="text" id="name" placeholder="Your Name" />
          <p class="error" id="nameError"></p>

          <input type="email" id="email" placeholder="Email" />
          <p class="error" id="emailError"></p>

          <textarea id="message" placeholder="Message"></textarea>
          <p class="error" id="messageError"></p>

          <button type="submit">Submit</button>
        </form>

        <script src="js/script.js"></script>
      </div>
    </div>

    <footer>© 2026 Elegance Fashion House. All rights reserved.</footer>
  </body>
</html>
